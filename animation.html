<header>

  <div class="header-top-row">

    <div class="header-left">
      <div class="site-branding">
        <img src="images/businesses/alexander-design-lab/alexander-design-lab-logo.png" 
             alt="Alexander Design Lab Logo" loading="lazy">
      </div>
    </div>

    <div class="header-right">
      <div class="header-ao-logo">
        <img src="images/businesses/alexander-olson-logo/ao-logo-white.png" 
             alt="AO Logo" loading="lazy">
      </div>
    </div>

  </div>

  <div class="header-center">
    <nav class="circle-nav">
      <div class="nav-scale-wrapper">
        <div class="nav-circles">
          <a class="nav-circle nav-spacer" aria-hidden="true"></a>
          <a href="index.html" class="nav-circle home">Home</a>

<section id="portfolio" class="section-with-border-1">
<main>

  <h3>Animation</h3>

  <!-- NEW GROUPED-SLIDE CROSSFADE CAROUSEL -->
  <div class="animation-carousel">

    <div class="carousel-stage">

      <!-- Slide 1 -->
      <div class="carousel-slide active">
        <div class="carousel-caption">Flour Sack Character</div>
          <video 
            class="carousel-video flour-sack raise-small"
            autoplay
            muted
            playsinline
            loop
            preload="auto"
          >
            <source src="images/animation/flour-sack-animation.mp4" type="video/mp4">
          </video>
      </div>

      <!-- Slide 2 -->
      <div class="carousel-slide">
        <div class="carousel-caption">Bouncing Ball</div>
          <video 
            class="carousel-video"
            autoplay
            muted
            playsinline
            loop
            preload="auto"
          >
            <source src="images/animation/ball-animation.mp4" type="video/mp4">
          </video>
      </div>

      <!-- Slide 3 -->
      <div class="carousel-slide">
        <div class="carousel-caption">Line Coming to Life</div>
          <video 
            class="carousel-video raise-med"
            autoplay
            muted
            playsinline
            loop
            preload="auto"
          >
            <source src="images/animation/line-animation.mp4" type="video/mp4">
          </video>
      </div>

    </div>

    <div class="carousel-controls">
      <button class="carousel-btn left" id="prevBtn">&#10094;</button>
      <button class="carousel-btn right" id="nextBtn">&#10095;</button>
    </div>

  </div>

</main>
</section>

<footer>
  <p class="p-style-3">&copy; 2026 Alexander Design Lab. All rights reserved.</p>
</footer>

</body>
</html>
